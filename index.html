<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBEX HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: #e0e0e0; padding: 20px; margin: 0; }
        h2 { color: #ff4d4d; text-align: center; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select {
            width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444;
            color: white; border-radius: 8px; box-sizing: border-box;
        }
        button {
            width: 100%; padding: 15px; background: #ff4d4d; color: white;
            border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em;
            cursor: pointer; margin-top: 10px;
        }
        .status { font-size: 0.8em; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>📍 НОВАЯ ЛОКАЦИЯ</h2>
    
    <div class="form-group">
        <label>Название объекта</label>
        <input type="text" id="name" placeholder="Напр: Заброшенный завод">
    </div>

    <div class="form-group">
        <label>Состояние (сохран)</label>
        <select id="condition">
            <option value="Целый">Целый (люкс)</option>
            <option value="Средний">Средний</option>
            <option value="Руины">Руины</option>
        </select>
    </div>

    <div class="form-group">
        <label>Доступ (залаз)</label>
        <input type="text" id="access" placeholder="Окно, дыра в заборе...">
    </div>

    <div class="form-group">
        <label>Охрана</label>
        <select id="security">
            <option value="Нет">Нет охраны</option>
            <option value="ЧОП/Сторож">ЧОП/Сторож</option>
            <option value="Камеры">Камеры</option>
        </select>
    </div>

    <div class="form-group">
        <label>Добавить фото</label>
        <input type="file" id="photo" accept="image/*">
    </div>

    <button id="sendData">ОТПРАВИТЬ В БАЗУ</button>
    <div id="locationStatus" class="status">Определяем адрес...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coords = "Житомир, Украина";

        // Автоматическое получение координат
        navigator.geolocation.getCurrentPosition((pos) => {
            coords = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
            document.getElementById('locationStatus').innerText = "📍 Координаты определены";
        }, () => {
            document.getElementById('locationStatus').innerText = "📍 Адрес: Житомир (центр)";
        });

        document.getElementById('sendData').addEventListener('click', () => {
            const name = document.getElementById('name').value;
            if (!name) return alert("Введите название!");

            const photoFile = document.getElementById('photo').files[0];
            
            if (photoFile) {
                const reader = new FileReader();
                reader.onloadend = () => sendDataToBot(reader.result);
                reader.readAsDataURL(photoFile);
            } else {
                sendDataToBot("");
            }

            function sendDataToBot(photoBase64) {
                const data = {
                    name: name,
                    condition: document.getElementById('condition').value,
                    access: document.getElementById('access').value,
                    security: document.getElementById('security').value,
                    coords: coords,
                    photo: photoBase64
                };
                tg.sendData(JSON.stringify(data));
                tg.close();
            }
        });
    </script>
</body>
</html>
