<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBEX HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #e0e0e0; padding: 20px; text-align: center; }
        h2 { color: #ff4d4d; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4d4d; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .status { font-size: 0.8em; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>📍 НОВАЯ ЛОКАЦИЯ</h2>
    <input type="text" id="name" placeholder="Название объекта">
    <select id="condition">
        <option value="Целый">Целый (люкс)</option>
        <option value="Средний">Средний</option>
        <option value="Руины">Руины</option>
    </select>
    <input type="text" id="access" placeholder="Доступ (залаз)">
    <select id="security">
        <option value="Нет">Нет охраны</option>
        <option value="ЧОП/Сторож">ЧОП/Сторож</option>
    </select>
    <button id="sendData">ОТПРАВИТЬ В БАЗУ</button>
    <div id="locationStatus" class="status">Определяем координаты...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coords = "50.2547, 28.6587"; // Житомир по дефолту

        navigator.geolocation.getCurrentPosition((pos) => {
            coords = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
            document.getElementById('locationStatus').innerText = "📍 Координаты определены";
        });

        document.getElementById('sendData').addEventListener('click', () => {
            const name = document.getElementById('name').value;
            if (!name) return alert("Введите название!");

            const data = {
                name: name,
                condition: document.getElementById('condition').value,
                access: document.getElementById('access').value,
                security: document.getElementById('security').value,
                coords: coords
            };

            // Отправляем только текст. Окно закроется само.
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
